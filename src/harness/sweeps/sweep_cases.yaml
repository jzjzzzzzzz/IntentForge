wall_mounted_bracket:
  width: [80, 100, 120, 150, 200]
  height: [40, 60, 80, 100]
  thickness: [4, 6, 8, 10]
  hole_diameter: [3, 5, 6, 8]
  hole_pattern: ["none", "symmetric_2_horizontal", "rectangular_4"]
  center_cutout: [true, false]
  rounded_corners: [true, false]
  invalid_cases:
    - name: hole_diameter_too_large
      reason: Hole diameter is larger than the plate height.
    - name: cutout_too_large
      reason: Center cutout is larger than the plate.
    - name: unsupported_hole_count
      reason: Three mounting holes are unsupported for wall-mounted brackets.

l_bracket:
  base_leg_length: [80, 100, 120, 150]
  vertical_leg_length: [60, 80, 100, 120]
  bracket_width: [30, 40, 50, 60]
  thickness: [4, 6, 8]
  base_holes: [true, false]
  vertical_holes: [true, false]
  gusset: [true, false]
  invalid_cases:
    - name: base_hole_spacing_too_large
      reason: Base hole spacing does not leave enough material.
    - name: unsupported_vertical_hole_count
      reason: Three vertical holes are unsupported for L-brackets.
    - name: gusset_too_large
      reason: Gusset height is larger than the available leg lengths.
