  applicable_evidence_ids: [ev_rule_hole_edge_margin_001, ev_rule_hole_spacing_001, ev_rule_tool_clearance_001, ev_rule_manufacturing_simplicity_001, ev_rule_fastener_accessibility_001, ev_rule_installation_difficulty_001, ev_rule_thin_section_warning_001, ev_package_rule_pack_mechanical]
  rule_ids: [hole_edge_margin_001, hole_spacing_001, gusset_recommendation_001, corner_radius_001, tool_clearance_001, manufacturing_simplicity_001, fastener_accessibility_001, installation_difficulty_001, cutout_stiffness_tradeoff_001, thin_section_warning_001]
  rule_variable_mapping:
    - metric: hole_edge_distance
      expression: "(flange_outer_diameter - bolt_circle_diameter) / 2.0 - (bolt_hole_diameter / 2.0)"
      remediation_parameter: flange_outer_diameter
      rule_ids: [hole_edge_margin_001, fastener_accessibility_001]
    - metric: hole_spacing
      expression: "bolt_circle_diameter * 3.141592653589793 / hole_count"
      remediation_parameter: bolt_circle_diameter
      rule_ids: [hole_spacing_001]
    - metric: thickness
      expression: "flange_thickness"
      remediation_parameter: flange_thickness
      rule_ids: [thin_section_warning_001]
  scope_note: The 65-item catalog is visible for audit mapping; bracket-specific evidence is not treated as flange verification. Only applicable_evidence_ids contribute engineering context.
limitations:
  - This profile does not certify ASME B16.5 pressure class, material, facing, hub, gasket, or load compliance.
  - The profile generates a flat ring flange only and requires external engineering review for service use.
metadata:
  adapter_kind: manifest
  standard_orientation: ASME B16.5-oriented, not certified
