topology_family: industrial_flange
manifest_version: "1.0"
title: Industrial pipe flange
description: Deterministic ASME B16.5-oriented flange profile foundation; dimensions are explicit inputs and are not a certification claim.
status: active
aliases: [industrial flange, pipe flange, flange]
parser_id: manifest_parameter_parser_v1
geometry_factory_id: industrial_flange_factory_v1
validator_id: industrial_flange_validator_v1
controlled_parameters:
  - {name: flange_outer_diameter, parameter_type: float, default: 150.0, unit: mm, safe_bounds: [40.0, 1500.0], description: Overall flange outside diameter.}
  - {name: bolt_circle_diameter, parameter_type: float, default: 110.0, unit: mm, safe_bounds: [20.0, 1400.0], description: Diameter of the bolt-hole center circle.}
  - {name: bolt_hole_diameter, parameter_type: float, default: 14.0, unit: mm, safe_bounds: [2.0, 120.0], description: Diameter of each through bolt hole.}
  - {name: hole_count, parameter_type: integer, default: 4, safe_bounds: [3.0, 64.0], description: Number of equally spaced bolt holes.}
  - {name: flange_thickness, parameter_type: float, default: 18.0, unit: mm, safe_bounds: [2.0, 200.0], description: Axial flange thickness.}
  - {name: bore_diameter, parameter_type: float, default: 60.0, unit: mm, safe_bounds: [5.0, 1000.0], description: Diameter of the central through bore.}
supported_features:
  - {feature_id: flange_body, operation: revolve_cylinder, description: Required cylindrical flange body., parameter_names: [flange_outer_diameter, flange_thickness]}
  - {feature_id: central_bore, operation: cut_central_bore, description: Required central through bore., parameter_names: [bore_diameter]}
  - {feature_id: bolt_hole_pattern, operation: cut_polar_hole_pattern, description: Equally spaced through-hole bolt circle., parameter_names: [bolt_circle_diameter, bolt_hole_diameter, hole_count]}
capability_evidence_binding:
  evidence_catalog_ids:
    - ev_rule_hole_edge_margin_001
    - ev_rule_hole_spacing_001
    - ev_rule_gusset_recommendation_001
    - ev_rule_corner_radius_001
    - ev_rule_tool_clearance_001
