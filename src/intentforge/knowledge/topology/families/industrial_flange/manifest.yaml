    - ev_rule_installation_difficulty_001
    - ev_rule_cutout_stiffness_tradeoff_001
    - ev_rule_thin_section_warning_001
    - ev_pack_bracket_mechanical
    - ev_pack_bracket_manufacturing
    - ev_pack_bracket_assembly
    - ev_pack_bracket_structural
    - ev_impl_wall_parser_support
    - ev_impl_wall_generator_support
