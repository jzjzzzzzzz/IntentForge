  - policy_id: intentforge_safe_rejection_review_v1
    title: IntentForge safe rejection review
    description: Reviews whether an unsupported or invalid request was rejected clearly without CAD export.
    policy_version: "1.0"
    policy_scope: assurance_case
    applicable_families: [wall_mounted_bracket, l_bracket, industrial_flange]
    applicable_operations: [parse, parse_build, edit_parse, edit_parse_apply]
    required_assurance_profiles: [static, standard, full]
    subject_type: safe_rejection
    decision_strategy: deterministic_precedence_v1
    provenance: IntentForge Phase 24 packaged baseline policy
    limitations:
      - A passing decision confirms rejection handling, not acceptance of the requested unsupported design.
    review_notice: The unsupported request remains rejected; only the deterministic rejection behavior is accepted within scope.
    checks:
      - check_id: rejection_schema_supported
        check_type: schema_version_supported
        title: Assurance schema is supported
        description: Requires a supported assurance-case schema version.
        severity: blocking
        required: true
        parameters: {supported_versions: ["1.0"]}
        on_pass: Assurance schema version is supported.
        on_failure: Assurance schema version is unsupported.
        on_unresolved: Assurance schema version could not be evaluated.
      - check_id: rejection_profile_allowed
        check_type: assurance_profile_allowed
        title: Rejection profile is eligible
        description: Safe rejection may be recorded under any assurance profile without claiming CAD success.
        severity: blocking
        required: true
        parameters: {allowed_profiles: [static, standard, full]}
        on_pass: Assurance profile is eligible for rejection review.
        on_failure: Assurance profile is outside rejection review scope.
        on_unresolved: Assurance profile is unavailable.
      - check_id: rejection_status_allowed
        check_type: overall_assurance_status_allowed
        title: Rejection assurance status is eligible
        description: Requires a complete scoped rejection record with limitations.
        severity: blocking
        required: true
        parameters: {allowed_statuses: [assurance_complete_with_limitations]}
        on_pass: Rejection assurance status is eligible.
        on_failure: Rejection assurance status is not eligible.
        on_unresolved: Rejection assurance status is unavailable.
      - check_id: rejection_claim_supported
        check_type: required_claim_status
        title: Unsupported behavior rejection claim is supported
        description: Requires the run-level safe-rejection claim and limitation disclosure.
        severity: blocking
        required: true
        parameters:
          claim_types: [unsupported_behavior_rejected, limitation_disclosed]
          allowed_statuses: [supported, partially_supported]
        related_claim_types: [unsupported_behavior_rejected, limitation_disclosed]
        on_pass: Safe rejection claims are present and scoped.
