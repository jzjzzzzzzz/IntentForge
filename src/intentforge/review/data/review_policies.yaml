    policy_scope: assurance_case
    applicable_families: [wall_mounted_bracket, l_bracket, industrial_flange]
    applicable_operations: [parse]
    required_assurance_profiles: [static]
    subject_type: design_result
    decision_strategy: deterministic_precedence_v1
    provenance: IntentForge Phase 24 packaged baseline policy
    limitations:
      - Static review does not establish that CAD generation or runtime geometry validation occurred.
    review_notice: Acceptance is limited to static intent and evidence checks within the declared IntentForge scope.
    checks:
      - check_id: static_schema_supported
        check_type: schema_version_supported
        title: Assurance schema is supported
        description: Requires a supported assurance-case schema version.
        severity: blocking
        required: true
        parameters: {supported_versions: ["1.0"]}
        on_pass: Assurance schema version is supported.
        on_failure: Assurance schema version is unsupported.
        on_unresolved: Assurance schema version could not be evaluated.
      - check_id: static_profile_allowed
        check_type: assurance_profile_allowed
        title: Static profile is used
        description: Prevents a static policy from being applied to an incompatible profile.
        severity: blocking
        required: true
        parameters: {allowed_profiles: [static]}
        on_pass: Static assurance profile is present.
        on_failure: Assurance profile is outside static policy scope.
        on_unresolved: Assurance profile is unavailable.
      - check_id: static_status_allowed
        check_type: overall_assurance_status_allowed
        title: Assurance status is eligible
        description: Requires a complete static assurance status, with disclosed limitations permitted.
        severity: blocking
        required: true
        parameters: {allowed_statuses: [assurance_complete, assurance_complete_with_limitations]}
        on_pass: Static assurance status is eligible.
        on_failure: Static assurance status is not eligible.
        on_unresolved: Static assurance status is unavailable.
      - check_id: static_required_claims
        check_type: required_claim_status
        title: Required static claims are supported
        description: Requires run-level interpretation, schema, family, and capability-evidence claims.
        severity: blocking
        required: true
        parameters:
          claim_types: [request_interpreted, intent_schema_valid, family_supported, capability_evidence_available]
          allowed_statuses: [supported]
        related_claim_types: [request_interpreted, intent_schema_valid, family_supported, capability_evidence_available]
        on_pass: Required static claims are supported.
        on_failure: One or more required static claims are not supported.
        on_unresolved: One or more required static claims are missing.
      - check_id: static_evidence_resolved
        check_type: required_evidence_status
        title: Referenced framework evidence resolves
        description: Statically resolves evidence referenced by this assurance case.
        severity: blocking
        required: true
        parameters: {allowed_statuses: [verified]}
        on_pass: Referenced framework evidence is statically resolved.
        on_failure: Referenced framework evidence has a disallowed status.
        on_unresolved: Referenced framework evidence could not be resolved.
      - check_id: static_zero_failed_claims
        check_type: zero_failed_claims
        title: No failed claims
        description: Requires no failed run-level assurance claims.
        severity: blocking
        required: true
        parameters: {}
        on_pass: No assurance claims failed.
        on_failure: At least one assurance claim failed.
        on_unresolved: Failed-claim state could not be evaluated.
      - check_id: static_zero_unresolved_claims
        check_type: zero_unresolved_claims
        title: No unresolved claims
        description: Requires no unresolved run-level assurance claims.
        severity: blocking
        required: true
        parameters: {}
        on_pass: No assurance claims are unresolved.
        on_failure: At least one assurance claim is unresolved.
        on_unresolved: Unresolved-claim state could not be evaluated.
      - check_id: static_review_notice
        check_type: required_review_disclosed
        title: External review boundary is disclosed
        description: Requires the assurance case to retain its external-review notice.
        severity: informational
        required: true
        parameters: {minimum_count: 1}
        on_pass: External review requirements are disclosed.
        on_failure: External review requirements are not disclosed.
        on_unresolved: Review requirements could not be evaluated.

